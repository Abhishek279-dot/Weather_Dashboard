<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Whether Dashboard</title>
</head>
<link rel="stylesheet" href="style.css">
<body>
  
    <div class="container">



      <div class="navbar">

      <!-- menu icon -->
    <div class="upicon">
      <i data-lucide="menu"></i>
    </div>

      <!-- city info -->
       <div class="location">
          <h3>India, Pune</h3>
          <p>Sat, June 24 2026</p>
       </div>

    <div class="upicon theme-toggle">
      <i data-lucide="moon">🌙</i>
    </div>

       </div>
       <!-- nav bar closed here -->
      


        <!-- body circle -->


        <div class="weather-box">

            <i data-lucide="cloud-rain" class="weather-icon" ></i>
                <div class="temp-circle">
            
                  <h1 class="temperature">23°C</h1>
            
                </div>
                
                <h3 class="weather-condition">Rain</h3>

                <div class="divider"></div>



                <!-- main data section  -->
              <div class="cards">



            <!-- card 1 wind -->
            <div class="details">

              <div class="title">

                  <i data-lucide="wind"></i>

                  <span>Wind</span>

              </div>

                  <h3>2 km/h</h3>

              </div>


            <!-- card 2 humidity -->
 
             <div class="details">

              <div class="title">

                  <i data-lucide="droplets"></i>

                  <span>Humidity</span>

              </div>

                  <h3>100%</h3>

            </div>
           
            


            <!-- card 3 Visibility -->


              <div class="details">

              <div class="title">

                  <i data-lucide="eye"></i>

                  <span>Visibility</span>

              </div>

                  <h3>10 km</h3>

              </div>

              
              
            </div> 
            <!-- cards closed here -->
              
              </div>
              <!-- weather-box closed here -->


              
          <div class="bottom">    
            <h4 class="today">Todays</h4>
            <p class="see-more">see more > </p>
          </div>




          <div class="forecaste">

            <!-- box 1 -->
            <div class="box">
              <p class="time">9:00 AM</p>
              <i data-lucide="cloud-drizzle"></i>
              <h4 class="temp">23°C</h4> 
            </div>

             <!-- box 2 -->
            <div class="box1">
              <p class="time">10:00 AM</p>
              <i data-lucide="umbrella"></i>
              <h4 class="temp">22°C</h4> 
            </div>

             <!-- box 3 -->
            <div class="box1">
              <p class="time">11:00 AM</p>
              <i data-lucide="cloud"></i>
              <h4 class="temp">25°C</h4> 
            </div>

             <!-- box 4 -->
            <div class="box1">
              <p class="time">12:00 PM</p>
              <i data-lucide="sun"></i>
              <h4 class="temp">28°C</h4> 
            </div>
            
          </div>








                
        </div>

   
    <script src ="script.js"></script>



  <!-- lucide icons library -->
   <script src="https://unpkg.com/lucide@latest"></script>
<script>
    lucide.createIcons();
</script>



</body>
</html>
